apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: devops
  labels:
    app: nginx
    version: "1.0"
    managed-by: kubectl

spec:
  replicas: 2
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: nginx

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: nginx
        version: "1.0"

    spec:
      containers:
      - name: nginx
        image: nginx:1.25.3

        ports:
        - containerPort: 80

        env:
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: nginx-config
              key: ENVIRONMENT

        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: nginx-config
              key: APP_NAME

        - name: APP_USERNAME
          valueFrom:
            secretKeyRef:
              name: nginx-secret
              key: username

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

      restartPolicy: Always
